name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: StanfordBDHG/.github/.github/workflows/swift-package-ci.yml@v2
    secrets: inherit